    <!--
      GitHub Pages SPA Redirect Handler
      
      This script works in conjunction with 404.html to handle client-side routing
      on GitHub Pages. When a user refreshes a page or navigates directly to a
      client-side route, 404.html redirects here with the path encoded in the URL.
      This script decodes the path and uses the History API to restore the original
      URL before React Router takes over.
    -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        
        // Handle the /?/ redirect from 404.html
        var search = location.search;
        if (search && search.length > 2 && search.slice(0, 2) === '?/') {
          var decoded = search.slice(2).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          
          var path = decoded.split('?')[0];
          var query = decoded.split('?')[1] || '';
          
          history.replaceState(
            null, 
            null,
            '/' + path + (query ? '?' + query : '') + location.hash
          );
        }
      })();
    </script>
