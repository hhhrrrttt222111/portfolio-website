<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <!--
      GitHub Pages SPA Redirect Fix
      
      WHY THIS FILE IS NEEDED:
      GitHub Pages serves static files and doesn't support server-side routing.
      When a user refreshes a client-side route (e.g., /about), GitHub Pages
      looks for a physical file at that path, which doesn't exist, resulting
      in a 404 error.
      
      HOW IT WORKS:
      1. GitHub Pages serves this 404.html for any non-existent path
      2. This script captures the current path and converts it to a query parameter
      3. It redirects to the root index.html with the path encoded in the URL
      4. The index.html script (see below) reads the query parameter and uses
         the History API to restore the original URL
      5. React Router then handles the route normally
      
      This is a well-known workaround for SPAs hosted on GitHub Pages.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function() {
        var segmentCount = 0;
        
        var location = window.location;
        var search = location.search;
        
        // Build the redirect URL with path info preserved
        var redirectUrl = 
          location.protocol + '//' + location.hostname + 
          (location.port ? ':' + location.port : '') +
          location.pathname.split('/').slice(0, 1 + segmentCount).join('/') + 
          '/?/' +
          location.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash;
        
        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>JavaScript is required for this application. Please enable JavaScript and refresh the page.</p>
      <p><a href="/">Return to Home</a></p>
    </noscript>
  </body>
</html>
